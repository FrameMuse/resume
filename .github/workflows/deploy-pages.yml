name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/deploy-pages.yml
      - .github/workflows/_deploy-pages.yml
      - bun.lock
      - index.html
      - package.json
      - public/**
      - src/**
      - ssr/**
      - tsconfig.json
      - tsconfig.node.json
      - vite.config.ts
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-pages.yml
    secrets: inherit
